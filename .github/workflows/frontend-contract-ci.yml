name: frontend-contract-ci

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-contract-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-contract-ci:
    name: Tauri type-check and OpenAPI drift
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.301'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.16.0'
          cache: npm
          cache-dependency-path: IronDev.TauriShell/package-lock.json

      - name: Pin npm
        shell: pwsh
        run: npm install --global npm@11.13.0

      - name: Frontend contract check
        shell: pwsh
        run: ./Scripts/ci/run-frontend-contract-ci.ps1

      - name: Verify evidence artifacts are sanitized
        if: always()
        id: artifact-safety
        shell: pwsh
        run: ./Scripts/ci/test-ci-evidence-artifact-safety.ps1 -ArtifactDirectory artifacts/ci/frontend-contract

      - name: Upload frontend contract evidence
        if: ${{ always() && steps.artifact-safety.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: frontend-contract-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/ci/frontend-contract
          retention-days: 14
          if-no-files-found: error
