name: governance-boundary-ci

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: governance-boundary-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance-boundary-ci:
    name: Build and governance boundary tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so origin/main exists: the changeset-shape guards diff
          # origin/main...HEAD, and without the ref they either throw (newer
          # helpers) or pass vacuously (older ones). A guard that cannot see the
          # diff is not evidence.
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore IronDev.slnx

      - name: Build
        run: dotnet build IronDev.slnx --no-restore

      - name: Governance boundary tests
        shell: pwsh
        run: ./Scripts/ci/run-governance-boundary-ci.ps1

      - name: Verify evidence artifacts are sanitized
        if: always()
        id: artifact-safety
        shell: pwsh
        run: ./Scripts/ci/test-ci-evidence-artifact-safety.ps1 -ArtifactDirectory artifacts/ci/governance-boundary

      - name: Upload governance boundary evidence
        if: ${{ always() && steps.artifact-safety.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: governance-boundary-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/ci/governance-boundary
          retention-days: 14
          if-no-files-found: error
