name: fast-unit-ci

on:
  pull_request:
    branches:
      - main
      - governance/block-f-rollup-to-main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fast-unit-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-unit-ci:
    name: Fast unit tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore IronDev.slnx

      - name: Build
        run: dotnet build IronDev.slnx --no-restore

      - name: Fast unit tests
        run: dotnet test IronDev.UnitTests/IronDev.UnitTests.csproj --no-build
