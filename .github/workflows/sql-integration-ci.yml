name: sql-integration-ci

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sql-integration-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  IRONDEV_CI_SQL_SERVER: localhost
  IRONDEV_CI_SQL_PORT: 1433
  IRONDEV_CI_SQL_DATABASE: IronDev_CI_${{ github.run_id }}_${{ github.run_attempt }}
  IRONDEV_CI_SQL_USER: sa

jobs:
  sql-integration-ci:
    name: SQL integration gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.301'

      - name: Start isolated SQL Server
        shell: pwsh
        run: |
          $password = "IronDev!$([Guid]::NewGuid().ToString('N'))aA1"
          $connection = "Server=localhost,1433;Database=$env:IRONDEV_CI_SQL_DATABASE;User Id=sa;Password=$password;Encrypt=True;TrustServerCertificate=True;"
          Write-Output "::add-mask::$password"
          Write-Output "::add-mask::$connection"
          "IRONDEV_CI_SQL_PASSWORD=$password" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ConnectionStrings__IronDeveloperDb=$connection" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          docker run --detach --name irondev-sql-integration --env ACCEPT_EULA=Y --env "MSSQL_SA_PASSWORD=$password" --publish 1433:1433 mcr.microsoft.com/mssql/server:2022-latest

      - name: Restore
        run: dotnet restore IronDev.slnx

      - name: Build
        run: dotnet build IronDev.slnx --no-restore

      - name: SQL integration gate
        shell: pwsh
        run: ./Scripts/ci/run-sql-integration-ci.ps1

      - name: Verify evidence artifacts are sanitized
        if: always()
        id: artifact-safety
        shell: pwsh
        run: ./Scripts/ci/test-ci-evidence-artifact-safety.ps1 -ArtifactDirectory artifacts/ci/sql-integration

      - name: Upload SQL integration evidence
        if: ${{ always() && steps.artifact-safety.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: sql-integration-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/ci/sql-integration
          retention-days: 14
          if-no-files-found: error
