name: sql-integration-ci

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sql-integration-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  IRONDEV_CI_SQL_SERVER: localhost
  IRONDEV_CI_SQL_PORT: 1433
  IRONDEV_CI_SQL_DATABASE: IronDev_CI_${{ github.run_id }}_${{ github.run_attempt }}
  IRONDEV_CI_SQL_USER: sa
  IRONDEV_CI_SQL_PASSWORD: IronDev_CI_Strong_Passw0rd_123!
  ConnectionStrings__IronDeveloperDb: Server=localhost,1433;Database=IronDev_CI_${{ github.run_id }}_${{ github.run_attempt }};User Id=sa;Password=IronDev_CI_Strong_Passw0rd_123!;Encrypt=True;TrustServerCertificate=True;

jobs:
  sql-integration-ci:
    name: SQL integration gate
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: IronDev_CI_Strong_Passw0rd_123!
        ports:
          - 1433:1433

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.301'

      - name: Restore
        run: dotnet restore IronDev.slnx

      - name: Build
        run: dotnet build IronDev.slnx --no-restore

      - name: SQL integration gate
        shell: pwsh
        run: ./Scripts/ci/run-sql-integration-ci.ps1

      - name: Verify evidence artifacts are sanitized
        if: always()
        id: artifact-safety
        shell: pwsh
        run: ./Scripts/ci/test-ci-evidence-artifact-safety.ps1 -ArtifactDirectory artifacts/ci/sql-integration

      - name: Upload SQL integration evidence
        if: ${{ always() && steps.artifact-safety.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: sql-integration-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/ci/sql-integration
          retention-days: 14
          if-no-files-found: error
